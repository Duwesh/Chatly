name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   lint-and-typecheck:
      name: Lint & Type Check
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install Dependencies
           run: bun install

         - name: Check Formatting
           run: bun run format:check

         - name: Run Linting
           run: bun run lint

         - name: Run Type Checking
           run: bun run typecheck

   build:
      name: Build Packages
      needs: lint-and-typecheck
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install Dependencies
           run: bun install

         - name: Build Client
           run: bun run build:client
